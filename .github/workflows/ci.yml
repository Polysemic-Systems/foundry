name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Format, lint, and test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CARGO_TERM_COLOR: always

    steps:
      # Foundry consumes digest/lethe/polysemic-core as path dependencies
      # from the sibling checkout: ../polysemic must exist next to foundry/.
      - name: Check out foundry
        uses: actions/checkout@v6
        with:
          path: foundry

      - name: Check out the sibling polysemic workspace
        uses: actions/checkout@v6
        with:
          repository: Polysemic-Systems/polysemic
          path: polysemic

      # The TDD vertical-slice tests exercise real Bubblewrap isolation.
      # Ubuntu 24.04 restricts unprivileged user namespaces via AppArmor by
      # default; relax it for the runner so bwrap can create its sandbox.
      - name: Install Bubblewrap for agent-isolation tests
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Install the pinned toolchain
        working-directory: foundry
        run: rustup show active-toolchain || rustup toolchain install

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: foundry

      - name: Check formatting
        working-directory: foundry
        run: cargo fmt --all -- --check

      - name: Lint with clippy
        working-directory: foundry
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        working-directory: foundry
        run: cargo test --workspace
